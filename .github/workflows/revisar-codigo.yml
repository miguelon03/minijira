name: Revisar codigo

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  revisar:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar codigo
        uses: actions/checkout@v6

      - name: Configurar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Revisar Python Flask
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install ruff pytest
          ruff check .
          if [ -d tests ]; then pytest; fi

      - name: Configurar Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Revisar Astro JavaScript
        run: |
          if [ -f package.json ]; then npm install; fi
          if [ -f package.json ]; then npm run build --if-present; fi
          if [ -f package.json ]; then npm test --if-present; fi

      - name: Revisar PHP
        run: |
          if find . -name "*.php" | grep -q .; then php -l $(find . -name "*.php"); fi